<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareerCraft — India's #1 Career Platform</title>
<meta name="description" content="India's most complete career platform. AI resume builder, video courses, quizzes and official e-certificates. Free to start."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold-lt:#e8c97a;--gold-dim:rgba(201,168,76,.1);--gold-border:rgba(201,168,76,.25);
  --bg:#08090d;--surface:#0f111a;--card:#141720;--card2:#1a1e2a;--border:#1e2535;
  --text:#eaedf5;--muted:#6b7585;--faint:#374151;--green:#22c55e;--red:#ef4444;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.65;font-size:15px;min-height:100vh;overflow-x:hidden}
::selection{background:rgba(201,168,76,.3)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:10px}
/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(8,9,13,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;padding:0 20px;gap:12px}
.nav-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);cursor:pointer;white-space:nowrap;flex-shrink:0}
.nav-logo span{color:var(--text)}
.nav-tabs{display:flex;gap:1px;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nt{padding:6px 11px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .18s;white-space:nowrap}
.nt:hover{color:var(--text);background:var(--card)}.nt.on{color:var(--gold);background:var(--gold-dim)}
.nav-pro{padding:7px 14px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:#0a0c10;cursor:pointer;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0}
.nav-pro:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,168,76,.35)}
/* HERO */
.hero{position:relative;padding:80px 24px 70px;text-align:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% -5%,rgba(201,168,76,.08),transparent 65%);pointer-events:none}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.2;pointer-events:none}
.hero-pill{display:inline-flex;align-items:center;gap:8px;background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold);border-radius:100px;padding:5px 14px 5px 8px;font-size:12px;font-weight:600;margin-bottom:22px;position:relative;z-index:1}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,60px);font-weight:900;line-height:1.08;letter-spacing:-1.5px;margin-bottom:18px;position:relative;z-index:1}
.hero h1 em{color:var(--gold);font-style:normal}
.hero-sub{font-size:16px;color:var(--muted);max-width:520px;margin:0 auto 32px;position:relative;z-index:1;line-height:1.7}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1;margin-bottom:44px}
.btn-primary{padding:13px 26px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:#08090d;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,168,76,.35)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{padding:13px 26px;border-radius:11px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-secondary:hover{border-color:var(--gold-border);color:var(--gold);transform:translateY(-2px)}
.btn-sm{padding:9px 18px;font-size:13px}
.btn-outline{padding:9px 18px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .18s}
.btn-outline:hover{border-color:var(--gold-border);color:var(--gold)}
.hero-stats{display:flex;justify-content:center;position:relative;z-index:1;flex-wrap:wrap}
.hstat{padding:14px 24px;border:1px solid var(--border);background:var(--card);text-align:center}
.hstat:first-child{border-radius:12px 0 0 12px}.hstat:last-child{border-radius:0 12px 12px 0}
.hstat:not(:first-child){border-left:none}
.hstat-num{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold);line-height:1}
.hstat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;font-weight:600}
/* TRUST */
.trust-strip{background:var(--card);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);white-space:nowrap}
/* PAGE */
.page{max-width:1080px;margin:0 auto;padding:0 20px 80px}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:2.5px;color:var(--gold);margin-bottom:8px;font-weight:700}
.sec-title{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,32px);font-weight:700;margin-bottom:8px;letter-spacing:-.5px}
.sec-sub{color:var(--muted);font-size:14px;max-width:520px;line-height:1.7;margin-bottom:28px}
.badge-free{display:inline-block;background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;letter-spacing:.8px;margin-left:8px;vertical-align:middle}
.badge-pro{display:inline-block;background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;letter-spacing:.8px;margin-left:8px;vertical-align:middle}
.divider{border:none;border-top:1px solid var(--border);margin:44px 0}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;margin-bottom:20px;padding:0}
/* FEATURES */
.feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-bottom:44px}
.feat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;transition:all .22s;cursor:pointer}
.feat-card:hover{border-color:var(--gold-border);transform:translateY(-3px);background:var(--card2)}
.feat-icon{font-size:26px;margin-bottom:10px;display:block}
.feat-card h3{font-size:14px;font-weight:600;margin-bottom:5px}
.feat-card p{font-size:12px;color:var(--muted);line-height:1.55}
.feat-tag{display:inline-block;margin-top:10px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px}
.ftfree{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.ftpro{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
/* STEPS */
.steps-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.step{padding:22px;text-align:center}
.step-num{width:42px;height:42px;border-radius:12px;background:var(--gold-dim);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--gold)}
.step h4{font-size:13px;font-weight:600;margin-bottom:4px}
.step p{font-size:12px;color:var(--muted);line-height:1.6}
/* TESTIMONIALS */
.testi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.testi-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.testi-stars{color:var(--gold);font-size:12px;margin-bottom:10px;letter-spacing:2px}
.testi-text{font-size:13px;color:#c9d0e0;line-height:1.75;margin-bottom:14px;font-style:italic}
.testi-author{display:flex;align-items:center;gap:10px}
.testi-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.testi-name{font-size:13px;font-weight:600}
.testi-role{font-size:11px;color:var(--muted)}
/* FAQ */
.faq-item{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:3px}
.faq-item.open{border-color:var(--gold-border)}
.faq-q{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;cursor:pointer;font-size:14px;font-weight:600;gap:12px}
.faq-q:hover{color:var(--gold)}
.faq-chevron{color:var(--muted);font-size:14px;flex-shrink:0;transition:transform .2s}
.faq-item.open .faq-chevron{transform:rotate(180deg);color:var(--gold)}
.faq-a{padding:14px 18px 16px;font-size:13px;color:var(--muted);line-height:1.75;border-top:1px solid var(--border)}
/* NEWSLETTER */
.nl-box{background:linear-gradient(135deg,var(--card),rgba(201,168,76,.06));border:1px solid var(--gold-border);border-radius:18px;padding:36px;text-align:center}
.nl-box h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:8px}
.nl-box p{color:var(--muted);font-size:14px;margin-bottom:22px}
.nl-form{display:flex;gap:10px;max-width:380px;margin:0 auto;flex-wrap:wrap;justify-content:center}
.nl-input{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .2s}
.nl-input:focus{border-color:var(--gold)}
.nl-input::placeholder{color:var(--muted)}

/* ═══ RESUME BUILDER ═══ */
.builder-wrap{display:grid;grid-template-columns:360px 1fr;gap:20px;align-items:start}
@media(max-width:860px){.builder-wrap{grid-template-columns:1fr}}
.form-panel{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.form-section{padding:16px 18px;border-bottom:1px solid var(--border)}
.form-section:last-of-type{border-bottom:none}
.form-section-head{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold);margin-bottom:12px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.fg:last-child{margin-bottom:0}
.fl{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600}
.fl-hint{font-size:10px;color:var(--faint);text-transform:none;letter-spacing:0;font-weight:400;font-style:italic;margin-left:4px}
.fi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .2s;width:100%;resize:none}
.fi:focus{border-color:var(--gold)}
.fi::placeholder{color:var(--faint);font-size:12px}
.ref-block{background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.15);border-radius:8px;padding:12px;margin-bottom:8px}
.ref-block:last-child{margin-bottom:0}
.ref-block-title{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:8px}
.gen-btn{width:100%;padding:13px;border-radius:0 0 16px 16px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:#08090d;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.gen-btn:hover:not(:disabled){box-shadow:0 -4px 20px rgba(201,168,76,.2)}
.gen-btn:disabled{opacity:.5;cursor:not-allowed}
/* TEMPLATE PICKER */
.tpicker{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.tcard{border-radius:9px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .18s}
.tcard:hover:not(.sel){border-color:rgba(201,168,76,.4);transform:translateY(-2px)}.tcard.sel{border-color:var(--gold)}
.tthumb{height:58px;position:relative;overflow:hidden;background:var(--surface)}
.tname{background:var(--surface);padding:4px;text-align:center;font-size:10px;font-weight:600;color:var(--muted)}
.tcard.sel .tname{color:var(--gold)}
.preview-box{display:flex;flex-direction:column;gap:12px}
.preview-frame{border-radius:12px;overflow:hidden;border:1px solid var(--border);box-shadow:0 24px 60px rgba(0,0,0,.6)}
.preview-frame iframe{width:100%;height:520px;border:none;display:block}
.ph-box{display:flex;align-items:center;justify-content:center;height:260px;background:var(--card);border-radius:12px;border:1px dashed var(--border);flex-direction:column;gap:10px;color:var(--muted);font-size:14px}
.dl-row{display:flex;gap:8px;flex-wrap:wrap}
.dl-btn{display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:9px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s}
.dl-btn:hover{border-color:var(--gold-border);color:var(--gold)}
.dl-main{background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:#08090d;border:none;font-weight:700}
.dl-main:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,168,76,.3);color:#08090d!important}
.ail{display:flex;gap:8px;align-items:center;color:var(--muted);font-size:13px;padding:16px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:bounce .8s infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* TIPS */
.tips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.tip-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:all .22s}
.tip-card:hover{border-color:rgba(201,168,76,.4);transform:translateY(-3px)}
.tip-icon{font-size:28px;margin-bottom:10px;display:block}
.tip-card h3{font-size:15px;font-weight:600;margin-bottom:5px}
.tip-card p{font-size:12px;color:var(--muted);line-height:1.55}
.tip-detail{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;animation:slideup .3s ease}
.tip-point{display:flex;gap:12px;padding:13px;background:var(--surface);border-radius:10px;border:1px solid var(--border);margin-bottom:9px}
.tip-point:last-child{margin-bottom:0}
.tip-num{min-width:26px;height:26px;border-radius:7px;background:var(--gold-dim);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.tip-point h4{font-size:13px;font-weight:600;margin-bottom:3px}
.tip-point p{font-size:12px;color:var(--muted);line-height:1.55}
.ai-loading{display:flex;gap:8px;align-items:center;color:var(--muted);font-size:13px;padding:18px 0}

/* COURSES */
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.course-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .22s;cursor:pointer}
.course-card:hover{transform:translateY(-4px);border-color:rgba(201,168,76,.3);box-shadow:0 20px 50px rgba(0,0,0,.4)}
.course-banner{height:100px;display:flex;align-items:center;justify-content:center;font-size:42px}
.course-body{padding:16px}
.course-body h3{font-size:15px;font-weight:600;margin-bottom:5px}
.course-body p{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.55}
.course-meta{display:flex;align-items:center;justify-content:space-between}
.course-dur{font-size:11px;color:var(--muted)}
.ctag{font-size:11px;font-weight:700;letter-spacing:.8px;padding:3px 9px;border-radius:6px}
.ctag-f{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.ctag-p{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.ci-row{display:flex;gap:6px;align-items:center;margin-bottom:4px;font-size:12px;color:#9ca3af}
.ci-check{font-size:10px;color:var(--green)}

/* LESSON */
.lesson-layout{display:grid;grid-template-columns:230px 1fr;gap:16px;align-items:start}
@media(max-width:740px){.lesson-layout{grid-template-columns:1fr}}
.lsidebar{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;position:sticky;top:68px}
.lside-head{padding:11px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold);border-bottom:1px solid var(--border)}
.litem{display:flex;align-items:center;gap:8px;padding:10px 13px;border-bottom:1px solid rgba(30,37,53,.8);cursor:pointer;transition:all .15s}
.litem:last-child{border-bottom:none}
.litem:hover:not(.la){background:rgba(201,168,76,.04)}.la{background:var(--gold-dim)}
.lnum-b{width:22px;height:22px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.la .lnum-b{background:rgba(201,168,76,.2);color:var(--gold)}
.ldone .lnum-b{background:rgba(34,197,94,.15);color:var(--green)}
.ltitle-b{font-size:12px;flex:1;line-height:1.4}
.ldur-b{font-size:10px;color:var(--muted);flex-shrink:0}
.lbox{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;animation:slideup .3s ease}
.lbox-head{padding:18px 22px;border-bottom:1px solid var(--border)}
.lbox-head h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:4px}
.lbox-head p{color:var(--muted);font-size:12px}
.lbox-body{padding:20px;display:flex;flex-direction:column;gap:16px}
.vid-wrap{width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;background:#000}
.vid-wrap iframe{width:100%;height:100%;border:none}
.vid-label{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-size:11px;color:var(--muted)}
.intro-box{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15);border-radius:10px;padding:13px 15px}
.intro-box p{font-size:13px;color:#e8c97a;line-height:1.75;font-weight:500}
.prose p{font-size:13px;line-height:1.85;color:#d1d5db;margin-bottom:11px}
.prose p:last-child{margin-bottom:0}
.kps{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
.kps h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold);margin-bottom:11px}
.kp{display:flex;gap:9px;margin-bottom:9px;align-items:flex-start}.kp:last-child{margin-bottom:0}
.kp-icon{font-size:16px;flex-shrink:0;line-height:1}
.kp h5{font-size:13px;font-weight:600;margin-bottom:2px}.kp p{font-size:12px;color:var(--muted);line-height:1.5}
.exercise-box{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:14px}
.exercise-box h4{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.exercise-box p{font-size:12px;color:#d1d5db;line-height:1.65}
.protip-box{background:rgba(34,197,94,.05);border-left:3px solid var(--green);padding:11px 14px;border-radius:0 10px 10px 0}
.protip-box strong{color:var(--green);font-size:11px;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px}
.protip-box p{font-size:12px;color:#d1d5db;line-height:1.6}
.prog-bar{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin:0 0 16px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-lt));border-radius:3px;transition:width .4s}
.lnav{display:flex;justify-content:space-between;align-items:center;padding:13px 20px;border-top:1px solid var(--border);gap:8px;flex-wrap:wrap}

/* QUIZ */
.quiz-box{background:rgba(201,168,76,.04);border:1px solid var(--gold-border);border-radius:14px;padding:20px;animation:slideup .3s ease}
.quiz-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.quiz-hd h3{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--gold-lt)}
.quiz-badges{display:flex;gap:6px;align-items:center}
.quiz-prog-badge{font-size:11px;color:var(--muted);background:var(--border);padding:3px 9px;border-radius:100px}
.quiz-attempt-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px}
.attempt-ok{background:rgba(34,197,94,.1);color:var(--green)}
.attempt-last{background:rgba(239,68,68,.1);color:var(--red)}
.quiz-qnum{font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px}
.quiz-q{font-size:14px;font-weight:500;line-height:1.65;margin-bottom:16px}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.qopt{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .18s;font-size:13px;color:#c9d0e0;text-align:left;width:100%;font-family:'DM Sans',sans-serif}
.qopt:hover:not(.qans){border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.04)}
.qopt.qsel{border-color:var(--gold);background:var(--gold-dim)}
.qopt.qcorr{border-color:var(--green);background:rgba(34,197,94,.08);color:var(--green)}
.qopt.qwrong{border-color:var(--red);background:rgba(239,68,68,.08);color:var(--red)}
.qopt.qshow{border-color:var(--green);background:rgba(34,197,94,.05);color:var(--green)}
.opt-ltr{width:24px;height:24px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:var(--muted)}
.qopt.qsel .opt-ltr{background:rgba(201,168,76,.2);color:var(--gold)}
.qopt.qcorr .opt-ltr{background:rgba(34,197,94,.2);color:var(--green)}
.qopt.qwrong .opt-ltr{background:rgba(239,68,68,.2);color:var(--red)}
.qopt.qshow .opt-ltr{background:rgba(34,197,94,.15);color:var(--green)}
.quiz-fb{margin-top:12px;padding:11px 13px;border-radius:10px;font-size:12px;line-height:1.5}
.quiz-fb.corr{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);color:#86efac}
.quiz-fb.wrong{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.score-ring{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:0 auto 14px;border:4px solid}
.score-ring.pass{border-color:var(--green);background:rgba(34,197,94,.07)}
.score-ring.fail{border-color:var(--red);background:rgba(239,68,68,.07)}
.score-num{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.score-ring.pass .score-num{color:var(--green)}.score-ring.fail .score-num{color:var(--red)}
.no-attempts{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:18px;text-align:center}

/* ASSESSMENT */
.assess-box{background:var(--card);border:1px solid var(--gold-border);border-radius:16px;padding:26px;text-align:center;animation:slideup .3s ease}
.info-pills{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
.info-pill{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center}
.ip-icon{font-size:18px;margin-bottom:3px}
.ip-txt{font-size:11px;color:var(--muted)}

/* CERTIFICATE */
.cert-overlay{position:fixed;inset:0;background:rgba(5,6,10,.97);z-index:500;display:flex;flex-direction:column;align-items:center;padding:20px;overflow-y:auto}
.cert-toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
.cert-frame{background:#faf8f0;border-radius:4px;width:100%;max-width:820px;box-shadow:0 40px 100px rgba(0,0,0,.8)}
.cert-inner{padding:52px 60px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:560px}
.c-bord-out{position:absolute;inset:13px;border:2.5px solid #c9a84c;pointer-events:none}
.c-bord-in{position:absolute;inset:20px;border:.5px solid rgba(201,168,76,.35);pointer-events:none}
.c-corner{position:absolute;font-size:20px;color:#c9a84c}
.c-corner.tl{top:6px;left:7px}.c-corner.tr{top:6px;right:7px}
.c-corner.bl{bottom:6px;left:7px}.c-corner.br{bottom:6px;right:7px}
.c-wm{position:absolute;font-family:'Playfair Display',serif;font-size:80px;color:rgba(201,168,76,.04);font-weight:900;transform:rotate(-30deg);top:50%;left:50%;translate:-50% -50%;white-space:nowrap;pointer-events:none}
.name-prompt{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px;text-align:center;max-width:440px;width:100%}
.name-prompt p{font-size:13px;color:var(--muted);margin-bottom:7px}
.name-prompt input{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);font-family:'Playfair Display',serif;font-size:15px;outline:none;width:100%;max-width:280px;transition:border .2s;text-align:center}
.name-prompt input:focus{border-color:var(--gold)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(8,9,13,.9);backdrop-filter:blur(10px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;max-width:420px;width:100%;text-align:center;animation:slideup .3s ease;box-shadow:0 40px 80px rgba(0,0,0,.7);position:relative}
.modal h2{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:8px}
.modal>p{color:var(--muted);font-size:13px;margin-bottom:22px}
.modal-x{position:absolute;top:13px;right:13px;width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.modal-x:hover{color:var(--text)}
.plan-row{display:flex;gap:10px;margin-bottom:18px}
.plan-opt{flex:1;border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .18s;text-align:center}
.plan-opt.pon{border-color:var(--gold);background:var(--gold-dim)}
.plan-opt h4{font-size:13px;font-weight:600;margin-bottom:5px}
.plan-price{font-size:22px;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif}
.plan-per{font-size:11px;color:var(--muted)}
.plan-save{font-size:11px;color:var(--green);font-weight:600;margin-top:3px}

.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.price-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;text-align:center;transition:all .2s;position:relative;display:flex;flex-direction:column}

.price-card:hover{transform:translateY(-4px)}
.price-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px}
.big-price{font-family:'Playfair Display',serif;font-size:38px;font-weight:700;margin:10px 0 3px;letter-spacing:-.5px}
.price-per{font-size:13px;color:var(--muted);font-weight:400;font-family:'DM Sans',sans-serif}
.price-feats{text-align:left;margin:14px 0;display:flex;flex-direction:column;gap:8px;flex:1}
.price-feat{display:flex;gap:8px;font-size:12px;color:#9ca3af;align-items:flex-start;line-height:1.5}
.feat-check{color:var(--green);flex-shrink:0;margin-top:1px}
.feat-badge-top{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:#08090d;border-radius:100px;padding:4px 14px;font-size:11px;font-weight:700;white-space:nowrap}

/* ABOUT */
.about-hero{background:linear-gradient(135deg,var(--card),rgba(201,168,76,.05));border:1px solid var(--border);border-radius:20px;padding:44px;text-align:center;margin-bottom:26px}
.about-hero h1{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;margin-bottom:12px}
.about-hero p{color:var(--muted);font-size:14px;line-height:1.8;max-width:540px;margin:0 auto 22px}
.story-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;margin-bottom:24px}
.story-box h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:12px}
.story-box p{font-size:13px;color:#c9d0e0;line-height:1.85;margin-bottom:10px}
.values-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:24px}
.value-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
.value-icon{font-size:26px;margin-bottom:8px}
.value-card h4{font-size:14px;font-weight:600;margin-bottom:5px}
.value-card p{font-size:12px;color:var(--muted);line-height:1.55}

/* FOOTER */
.footer{background:var(--surface);border-top:1px solid var(--border);padding:44px 24px 26px}
.footer-inner{max-width:1080px;margin:0 auto}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:36px;margin-bottom:32px}
@media(max-width:700px){.footer-top{grid-template-columns:1fr 1fr}}
.footer-col h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:12px}
.footer-col a{display:block;font-size:12px;color:var(--muted);margin-bottom:8px;cursor:pointer;transition:color .15s;text-decoration:none}
.footer-col a:hover{color:var(--text)}
.footer-bottom{border-top:1px solid var(--border);padding-top:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.footer-bottom p{font-size:11px;color:var(--muted)}
.toast{position:fixed;bottom:22px;right:22px;background:var(--card);border:1px solid var(--green);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:999;animation:slideup .3s ease;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.toast span{font-size:13px;font-weight:500}
@keyframes slideup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.hero h1{font-size:30px}.hero-stats{gap:6px}.hstat{border-radius:10px!important;border:1px solid var(--border)!important}.footer-top{grid-template-columns:1fr 1fr}}
@media print{body>*:not(.cert-overlay){display:none!important}.cert-overlay{position:static!important;background:none!important;padding:0!important}.cert-toolbar,.name-prompt,.back-btn{display:none!important}}

     {id:'ps-1',title:'Overcoming Fear & Stage Fright',dur:'22 min',videoId:'8eRx5Wo3xIA',videoLabel:'Julian Treasure — "How to speak so people want to listen" (TED)',
      intro:'Fear of public speaking affects 75% of people — yet it is one of the most learnable skills in the world. You will understand exactly why your body reacts the way it does and walk away with 5 proven, science-backed techniques.',
      prose:['When you stand up to speak, your amygdala interprets the audience\'s gaze as a physical threat, triggering fight-or-flight. Cortisol and adrenaline flood your bloodstream — racing heart, sweaty palms, shaky hands. The key insight: your body is not failing you. It is giving you an enormous energy boost, the same chemistry elite athletes feel before competition.','Harvard researcher Alison Wood Brooks found that people who told themselves "I am excited" before a speech performed significantly better than those who tried to calm down. You cannot think your way to calm. But you can redirect the energy deliberately.','Five techniques: (1) Box Breathing — 4-4-4-4 — lowers cortisol in 90 seconds. (2) Power Posing — 2 minutes of expansive posture raises confidence hormones. (3) Vivid Visualization — 10 minutes imagining success activates identical neural pathways as real rehearsal. (4) Audience Reframing — replace "They are judging me" with "They want me to succeed." (5) Progressive Exposure — record a 1-minute opinion video daily for 30 days. Confidence is built through repetition, not resolution.'],
      keyPoints:[{icon:'🧠',h:'Reframe anxiety as excitement',b:'Say "I am excited" instead of "I am nervous." Harvard research shows this reframe measurably improves performance.'},{icon:'💨',h:'Box breathing calms in 90 seconds',b:'4-count in, hold 4, out 4, hold 4. Physiologically activates your parasympathetic nervous system.'},{icon:'💪',h:'Power posing changes your chemistry',b:'2 minutes of open, expansive posture raises confidence hormones and lowers stress hormones.'},{icon:'🎯',h:'Preparation is the ultimate cure',b:'80% of speaking anxiety comes from under-preparation. Know your opening and closing completely cold.'}],
      exercise:'Record yourself speaking on any topic for exactly 3 minutes. Watch it back once with sound and once muted. Write one thing you did well and one to improve. Repeat weekly for 4 weeks.',

     {id:'ps-2',title:'Structuring Any Speech for Impact',dur:'25 min',videoId:'xnFF9F5_kAU',videoLabel:'Nancy Duarte — "The Secret Structure of Great Talks" (TED)',
      intro:'Great speakers are not born with charisma — they master structure. When your speech is built on a solid framework, you always know where you are and where you are going.',
      prose:['Your first 30 seconds determine whether your audience mentally checks in or checks out. Never open with "Good morning, my name is..." Five proven hooks: (1) The Question — "What if everything you believed about success was a lie?" (2) The Statistic — a powerful number that creates instant context. (3) The Mid-Scene Story — begin in the middle of a dramatic moment. (4) The Bold Claim — something surprising about your topic. (5) Strategic Silence — stand still and hold eye contact for 5 full seconds before speaking.','THE BODY: Make exactly 3 main points — the brain organises information in triads. Within each point: one story (emotional connection), one fact (credibility), one example (clarity). THE CLOSE: Summarise your entire speech in one sentence, deliver a specific call to action, end on an emotional high. Write your closing line before anything else — knowing your destination makes every creative decision easier.'],
      keyPoints:[{icon:'🎣',h:'Hook in the first 30 seconds',b:'Question, statistic, mid-scene story, bold claim, or strategic silence. Never introduce yourself first.'},{icon:'3️⃣',h:'Exactly 3 main points',b:'The brain loves triads. More than 3 and the audience cannot retain your message.'},{icon:'📖',h:'Story + Fact + Example per point',b:'Each point needs all three: story creates emotion, fact creates credibility, example creates clarity.'},{icon:'🎯',h:'Close with one clear action',b:'Tell your audience the single specific thing you want them to think or do next.'}],
      exercise:'Write a 3-minute speech about your career journey using today\'s structure. Use one opening hook. Make exactly 3 points. Close with what you want your listener to do differently. Record it.',

     {id:'ps-3',title:'Vocal Power — Pitch, Pace & Pause',dur:'20 min',videoId:'eIho2S0ZahI',videoLabel:'Roger Love — "How to Use Your Voice" (TEDx)',
      intro:'Your voice carries 38% of your communication impact. HOW you say something is more influential than WHAT you say. Master the four vocal levers used by TED speakers and executives worldwide.',
      prose:['Four vocal levers: PITCH — drop to your lowest comfortable pitch on your most important statements — lower pitch signals authority. PACE — slow down 30% from conversational speed. Most nervous speakers rush, which signals anxiety. VOLUME — unexpected quietness is more powerful than loudness. Dropping to near-whisper at a climactic moment makes every listener lean forward. RESONANCE — place your hand on your chest and hum — feel that vibration. That is chest resonance. Practice speaking from that place for an authoritative, trustworthy voice.','5-MINUTE WARM-UP before every speech: (1) Lip trills — 30 seconds. (2) Tongue twisters — "red leather, yellow leather" rapidly for 30 seconds. (3) Sirens — slide from lowest to highest pitch 5 times. (4) Exaggerated yawning — opens the throat. (5) Humming — at comfortable pitch for 30 seconds. These 5 exercises done consistently will transform your vocal performance in 30 days.'],
      keyPoints:[{icon:'🎵',h:'Variation is everything',b:'A monotone voice loses audiences within 4-5 minutes regardless of content. Range between high and low creates energy.'},{icon:'⏸️',h:'Silence after a key point IS the emphasis',b:'2-4 seconds of deliberate silence gives your most important sentence more weight than any adjective.'},{icon:'🔉',h:'Whispering creates more impact than shouting',b:'A sudden drop in volume at a climactic moment makes every listener physically lean in.'},{icon:'🎙️',h:'Warm up for 5 minutes every time',b:'Your vocal cords are muscles. Skipping warm-up leads to strain, cracks, and reduced range.'}],

     {id:'ps-4',title:'Body Language That Commands Respect',dur:'23 min',videoId:'Ks-_Mh1QhMc',videoLabel:'Amy Cuddy — "Your Body Language Shapes Who You Are" (TED) · 60M+ views',
      intro:'55% of your communication is non-verbal. Before you speak a single word, your body has already shaped how your audience feels about you. Master the body language codes of confident communicators.',
      prose:['Dr. Albert Mehrabian\'s research: words carry 7% of meaning, voice 38%, body language 55%. When your words say one thing but your body says another, people believe your body every single time. POSTURE FOUNDATION: Feet hip-width apart, shoulders back and down, chin parallel to the floor. This single adjustment makes you appear 40% more authoritative. EYE CONTACT: Make contact with individual people for 3-5 seconds — genuine connection without staring. Move intentionally around the room so everyone feels seen. GESTURES: Open palms upward convey honesty — an ancient biological trust signal.','THE POWER POSE: Hold an expansive, open pose for 2 minutes before any high-stakes interaction. Amy Cuddy\'s research: testosterone rises approximately 20%, cortisol falls approximately 25%. WHAT TO AVOID: Crossed arms (defensive), hands in pockets (hiding), touching your face while speaking (deception signal), swaying or rocking (nervous energy), nodding excessively (approval-seeking).'],

  {id:'pc',icon:'📩',title:'Professional Communication Mastery',color:'#102020',duration:'2h 15m',
   desc:'Write emails that get read, speak in meetings that get remembered, and listen in a way that builds lasting professional trust.',

   lessons:[
     {id:'pc-1',title:'The Pyramid Principle — Write Like McKinsey',dur:'22 min',videoId:'MtHgO6bVFTc',videoLabel:'The Pyramid Principle — Barbara Minto Framework explained',
      intro:'The Pyramid Principle is the communication framework used at McKinsey, Goldman Sachs, and Google. The single most powerful structure for any professional writing.',
      prose:['Lead with your conclusion, then support it. Most people build context, explain their analysis, and bury the conclusion at the end — forcing readers to read everything before knowing why they should care. Professional communication reverses this. THE PYRAMID: Level 1 — your single clear conclusion at the top. Level 2 — three supporting reasons. Level 3 — evidence for each reason. In emails: first sentence = your conclusion. Paragraphs 2, 3, 4 = supporting reasons. Subject line = a one-line conclusion ("Proposing to delay Q3 launch by 2 weeks — seeking sign-off").','THE SO WHAT TEST: After every sentence ask "So what?" If you cannot answer with something the reader genuinely cares about, cut that sentence. Most business writing fails this test in 40% of its sentences. SCQA: Situation → Complication → Question → Answer. This structure mirrors how the brain naturally processes information and works for any format — email, report, or presentation.'],
      keyPoints:[{icon:'🔺',h:'Lead with your conclusion always',b:'State what you want in the first sentence. Reasoning follows. This respects the reader\'s time and signals confident thinking.'},{icon:'3️⃣',h:'Three supporting reasons maximum',b:'More than three suggests you haven\'t prioritised clearly enough. Less is always more in professional writing.'},{icon:'❓',h:'Apply the "So What?" test ruthlessly',b:'After every sentence: "So what?" If the answer is nothing the reader cares about, delete it. No exceptions.'},{icon:'📧',h:'Subject line = conclusion not topic',b:'"Request: Approval for Q4 budget increase" beats "Budget Discussion" every single time.'}],
      exercise:'Take the last important email you sent. Rewrite it using the Pyramid Principle: put your main point in the first sentence, then support it with exactly 3 short paragraphs. Compare the two versions.',
      proTip:'Executives often read only the first and last sentence of each paragraph. Write as if that is literally true. If those two sentences don\'t carry your full message, your email has already failed.'},
     {id:'pc-2',title:'Active Listening — The Rarest Skill',dur:'20 min',videoId:'R1vskiVDwl4',videoLabel:'Celeste Headlee — "10 Ways to Have a Better Conversation" (TED) · 25M+ views',
      intro:'Most people listen to reply, not to understand. Active listening is the single most underrated skill in any workplace — and almost nobody truly has it.',
      prose:['A Korn Ferry study found listening skills are the top quality separating effective leaders from average performers. Yet 94% of people who self-rate as excellent listeners are rated as poor listeners by others. RASA — a framework for genuine active listening: Receive (full attention — phone away, body toward the speaker), Appreciate (small acknowledgments — "mmm," gentle nodding), Summarise ("So what I\'m hearing is..."), Ask (questions about what THEY said, not what you want to discuss).','LISTEN-FIRST: Before any important conversation: "My only job for the first 5 minutes is to understand, not respond." SILENCE IS PART OF LISTENING: Wait 3 seconds after someone stops speaking — silence surfaces the most important, unguarded information. EMPATHIC VALIDATION: Before offering your perspective, validate the emotion: "That sounds genuinely frustrating." Validation does not mean agreement — it unlocks the other person\'s openness to hearing you.'],
      keyPoints:[{icon:'📵',h:'Phone away — not just face-down',b:'The mere visible presence of a smartphone reduces conversation quality by 40% — even when neither person checks it.'},{icon:'3️⃣',h:'Wait 3 seconds after they stop speaking',b:'Silence surfaces the most important, unguarded information. Filling it immediately is a costly conversational habit.'},{icon:'🔄',h:'Summarise before responding',b:'"So what I\'m hearing is..." proves you actually listened and prevents 80% of misunderstandings.'},{icon:'❤️',h:'Validate emotion before offering logic',b:'People need to feel genuinely understood before they can receive new information.'}],
      exercise:'In your next 3 professional conversations, ask at least 2 follow-up questions about something the other person said before sharing anything about yourself. Notice how people respond to you differently.',
      proTip:'The highest compliment you can pay someone is to remember what they told you last time and reference it specifically: "How did that presentation go?" This builds more professional goodwill than almost anything else.'},
     {id:'pc-3',title:'Difficult Conversations — Say the Hard Thing Well',dur:'25 min',videoId:'S45eWMVnMpU',videoLabel:'Stone, Patton & Heen — "Difficult Conversations" (Harvard Law)',
      intro:'Every career breakthrough requires a difficult conversation. Most people avoid these moments — which is precisely why those who master them advance faster than everyone around them.',
      prose:['Harvard\'s Stone, Patton, and Heen found every difficult conversation contains three simultaneous conversations: "What happened?" (who did what, why), "Feelings" (both parties\' emotional experience), and "Identity" (what this means about who I am). Most people address only the first and wonder why the other two keep derailing things. SBI FRAMEWORK: Situation (describe factually: "In our Monday meeting..."), Behaviour (the specific observable action: "when you cut across my presentation three times..."), Impact ("it made it very difficult for me to finish my thought"). No blame, no labels — observable facts and specific impact.','Use "I noticed" not "You always." Use "I felt" not "You made me feel." These shifts take you from accusation to observation — the difference between a fight and a conversation. THE THIRD STORY: Enter conflict as a neutral observer: "We seem to see this differently — I\'d like to understand your perspective." This signals curiosity, not combat.'],
      keyPoints:[{icon:'🔍',h:'Observable behaviour only — no labels',b:'"You interrupted me three times" is observable. "You are disrespectful" is a label. Only one invites productive conversation.'},{icon:'🗣️',h:'"I" statements over "you" statements',b:'"I felt sidelined" invites empathy. "You sidelined me" invites defence. Same truth — completely different outcome.'},{icon:'⏸️',h:'Ask for time before responding to feedback',b:'"Let me think about this properly" is not weakness — it is the most professional response and produces better outcomes.'},{icon:'🌐',h:'Start from the Third Story',b:'Describe conflict as a neutral observer: "We see this differently — help me understand your perspective."'}],
      exercise:'Think of one difficult conversation you\'ve been avoiding. Write the complete SBI script: exact Situation, specific observable Behaviour, and Impact on you or the team. Writing it removes the emotional charge.',
      proTip:'The best preparation for a difficult conversation is practising small doses of direct, kind honesty every single day. Each small honest moment builds the muscle for the big ones.'},
     {id:'pc-4',title:'Meeting Communication — From Invisible to Indispensable',dur:'18 min',videoId:'wlZPRL1bphs',videoLabel:'Professional meeting facilitation & speaking up — Expert session',
      intro:'Most professionals speak in only 1 in 5 meetings they attend — and their careers reflect exactly that. Meeting visibility is one of the highest-leverage career activities you have access to right now.',
      prose:['Harvard Business School: employees who speak up in meetings with relevant contributions are promoted faster, paid more, and rated as higher performers — regardless of the quality of their other work. THE FIRST 10 MINUTES RULE: Speak within the first 10 minutes of every meeting. It does not need to be groundbreaking — ask a clarifying question, build on someone\'s point: "I think what Priya raised is genuinely important." This removes the psychological barrier of speaking "for the first time" that silences people for entire meetings.','PREPARE 1 QUESTION + 1 CONTRIBUTION before every meeting. The Contribution Ladder from lowest to highest: (1) Agreeing with others, (2) Asking clarifying questions, (3) Adding data, (4) Making a new observation, (5) Proposing a specific recommendation. Aim for levels 4-5 at least once per meeting. FOLLOW UP IN WRITING within 30 minutes: "Quick recap: [1] [2] [3] — [Name] to do X by Friday." Almost nobody does this — which is exactly why it works.'],
      keyPoints:[{icon:'⏱️',h:'Speak within the first 10 minutes',b:'Break your silence early in every meeting. Once you speak once, speaking again becomes effortless.'},{icon:'📋',h:'Prepare 1 question + 1 contribution',b:'5 minutes of preparation prevents the paralysis of "I had nothing worth saying." Make this a discipline.'},{icon:'🏆',h:'End with decisions + actions + owners',b:'A meeting without clearly stated next steps and named owners is just a conversation.'},{icon:'📝',h:'Send written recap within 30 minutes',b:'This single habit builds your reputation for reliability and leadership more than almost anything else.'}],
      exercise:'In your next meeting, commit to two contributions: one in the first 10 minutes and one distinct new point. Write both down before the meeting. Having them prepared removes the barrier to saying them.',
      proTip:'Consistent, relevant meeting contributions shape how decision-makers perceive your potential more than performance reviews, one-on-ones, or networking combined. Make it a daily non-negotiable.'},

// ═══ QUIZ COMPONENT — 5 questions, max 2 retries, shuffle on retry ═══
function Quiz({poolKey,onPass}){
  const MAX=2;
  const pool=QUIZ_POOLS[poolKey]||[];
  const LT=['A','B','C','D'];
  function getQs(){return [...pool].sort(()=>Math.random()-.5).slice(0,5);}
  const [attempt,setAttempt]=useState(1);
  const [questions,setQuestions]=useState(()=>getQs());
  const [idx,setIdx]=useState(0);
  const [sel,setSel]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [scores,setScores]=useState([]);
  const [done,setDone]=useState(false);
  const q=questions[idx];
  function pick(i){if(answered)return;setSel(i);setAnswered(true);setScores(s=>[...s,i===q.ans]);}
  function next(){if(idx<questions.length-1){setIdx(i=>i+1);setSel(null);setAnswered(false);}else setDone(true);}
  function retry(){
    const na=attempt+1;setAttempt(na);
    setQuestions(getQs());setIdx(0);setSel(null);setAnswered(false);setScores([]);setDone(false);
  }
  if(done){
    const p=scores.filter(Boolean).length;
    const pass=p>=Math.ceil(questions.length*.75);
    return React.createElement('div',{className:'quiz-box',style:{textAlign:'center'}},
      React.createElement('div',{className:`score-ring ${pass?'pass':'fail'}`},
        React.createElement('div',{className:'score-num'},`${p}/${questions.length}`),
        React.createElement('div',{style:{fontSize:11,color:pass?'var(--green)':'var(--red)',fontWeight:700}},pass?'PASS':'FAIL')
      ),
      React.createElement('h3',{style:{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,marginBottom:8}},pass?'🎉 Quiz Passed!':'Not quite — review and retry'),
      React.createElement('p',{style:{fontSize:13,color:'var(--muted)',marginBottom:14}},pass?`${p}/${questions.length} correct — excellent work!`:`${p}/${questions.length} correct. Need ${Math.ceil(questions.length*.75)} to pass.`),
      pass?React.createElement('button',{className:'btn-primary btn-sm',onClick:onPass},'Continue to Next Lesson →'):
      attempt<MAX?React.createElement('div',null,
        React.createElement('p',{style:{fontSize:12,color:'var(--gold)',marginBottom:10,fontWeight:600}},`Attempt ${attempt} of ${MAX} — new questions will appear on retry!`),
        React.createElement('button',{className:'btn-primary btn-sm',onClick:retry},'Retry with New Questions 🔄')
      ):React.createElement('div',{className:'no-attempts'},
        React.createElement('div',{style:{fontSize:24,marginBottom:8}},'📚'),
        React.createElement('p',{style:{fontSize:13,color:'var(--red)',fontWeight:600,marginBottom:6}},'Maximum 2 attempts reached'),
        React.createElement('p',{style:{fontSize:12,color:'var(--muted)'}},'Please review the lesson content thoroughly and come back to try again later.')
      )
    );
  }
  return React.createElement('div',{className:'quiz-box'},
    React.createElement('div',{className:'quiz-hd'},
      React.createElement('h3',null,'📝 Lesson Quiz'),
      React.createElement('div',{className:'quiz-badges'},
        React.createElement('span',{className:`quiz-attempt-badge ${attempt<MAX?'attempt-ok':'attempt-last'}`},`Attempt ${attempt}/${MAX}`),
        React.createElement('span',{className:'quiz-prog-badge'},`${idx+1}/${questions.length}`)
      )
    ),
    React.createElement('div',{className:'quiz-qnum'},`Question ${idx+1} of ${questions.length}`),
    React.createElement('div',{className:'quiz-q'},q.q),
    React.createElement('div',{className:'quiz-opts'},q.opts.map((opt,i)=>{
      let cls='qopt';
      if(answered){cls+=' qans';if(sel===i)cls+=i===q.ans?' qcorr':' qwrong';else if(i===q.ans)cls+=' qshow';}
      else if(sel===i)cls+=' qsel';
      return React.createElement('button',{key:i,className:cls,onClick:()=>pick(i)},
        React.createElement('span',{className:'opt-ltr'},LT[i]),opt
      );
    })),
    answered&&React.createElement('div',{className:`quiz-fb ${sel===q.ans?'corr':'wrong'}`},
      React.createElement('strong',null,sel===q.ans?'✓ Correct! ':'✗ Not quite — '),q.exp
    ),
    answered&&React.createElement('div',{style:{display:'flex',justifyContent:'flex-end',marginTop:12}},
      React.createElement('button',{className:'btn-primary btn-sm',onClick:next},idx<questions.length-1?'Next →':'See Results')
    )
  );
}
