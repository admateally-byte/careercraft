<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareerCraft — Build the Career You Deserve</title>
<meta name="description" content="India's most complete career platform. AI resume builder, video courses, quizzes and official e-certificates. Free to start."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold-lt:#e8c97a;--gold-dim:rgba(201,168,76,.1);--gold-border:rgba(201,168,76,.25);
  --bg:#08090d;--surface:#0f111a;--card:#141720;--card2:#1a1e2a;--border:#1e2535;
  --text:#eaedf5;--muted:#6b7585;--faint:#374151;
  --green:#22c55e;--red:#ef4444;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.65;font-size:15px;min-height:100vh;overflow-x:hidden}
::selection{background:rgba(201,168,76,.3)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:10px}
.nav{position:sticky;top:0;z-index:100;background:rgba(8,9,13,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;padding:0 24px;gap:16px}
.nav-logo{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:var(--gold);cursor:pointer;white-space:nowrap}
.nav-logo span{color:var(--text)}
.nav-tabs{display:flex;gap:1px;flex:1;overflow-x:auto}
.nt{padding:6px 12px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .18s;white-space:nowrap}
.nt:hover{color:var(--text);background:var(--card)}.nt.on{color:var(--gold);background:var(--gold-dim)}
.nav-pro{padding:7px 16px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:#0a0c10;cursor:pointer;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0}
.nav-pro:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,168,76,.35)}
.hero{position:relative;padding:90px 24px 80px;text-align:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% -5%,rgba(201,168,76,.08) 0%,transparent 65%);pointer-events:none}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.25;pointer-events:none}
.hero-pill{display:inline-flex;align-items:center;gap:8px;background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold);border-radius:100px;padding:5px 14px 5px 8px;font-size:12px;font-weight:600;margin-bottom:24px;position:relative;z-index:1}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(34px,5.5vw,64px);font-weight:900;line-height:1.08;letter-spacing:-1.5px;margin-bottom:20px;position:relative;z-index:1}
.hero h1 em{color:var(--gold);font-style:normal}
.hero-sub{font-size:16px;color:var(--muted);max-width:540px;margin:0 auto 36px;position:relative;z-index:1;line-height:1.7}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1;margin-bottom:48px}
.btn-primary{padding:13px 26px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:#08090d;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,168,76,.35)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{padding:13px 26px;border-radius:11px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-secondary:hover{border-color:var(--gold-border);color:var(--gold);transform:translateY(-2px)}
.btn-sm{padding:9px 18px;font-size:13px}
.btn-outline{padding:9px 18px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .18s}
.btn-outline:hover{border-color:var(--gold-border);color:var(--gold)}
.hero-stats{display:flex;justify-content:center;gap:0;position:relative;z-index:1;flex-wrap:wrap}
.hstat{padding:16px 28px;border:1px solid var(--border);background:var(--card);text-align:center}
.hstat:first-child{border-radius:12px 0 0 12px}.hstat:last-child{border-radius:0 12px 12px 0}
.hstat:not(:first-child){border-left:none}
.hstat-num{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--gold);line-height:1}
.hstat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-weight:600}
.trust-strip{background:var(--card);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:center;gap:28px;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);white-space:nowrap}
.page{max-width:1080px;margin:0 auto;padding:0 24px 80px}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:2.5px;color:var(--gold);margin-bottom:8px;font-weight:700}
.sec-title{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,32px);font-weight:700;margin-bottom:8px;letter-spacing:-.5px}
.sec-sub{color:var(--muted);font-size:14px;max-width:520px;line-height:1.7;margin-bottom:28px}
.badge-free{display:inline-block;background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);border-radius:6px;padding:2px 10px;font-size:11px;font-weight:700;letter-spacing:.8px;margin-left:10px;vertical-align:middle}
.badge-pro{display:inline-block;background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);border-radius:6px;padding:2px 10px;font-size:11px;font-weight:700;letter-spacing:.8px;margin-left:10px;vertical-align:middle}
.divider{border:none;border-top:1px solid var(--border);margin:48px 0}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:48px}
.feat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;transition:all .22s;cursor:pointer}
.feat-card:hover{border-color:var(--gold-border);transform:translateY(-3px);background:var(--card2)}
.feat-icon{font-size:28px;margin-bottom:12px;display:block}
.feat-card h3{font-size:15px;font-weight:600;margin-bottom:6px}
.feat-card p{font-size:13px;color:var(--muted);line-height:1.55}
.feat-tag{display:inline-block;margin-top:12px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px}
.ftfree{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.ftpro{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.steps-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0}
.step{padding:24px;text-align:center}
.step-num{width:44px;height:44px;border-radius:12px;background:var(--gold-dim);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold)}
.step h4{font-size:14px;font-weight:600;margin-bottom:5px}
.step p{font-size:12px;color:var(--muted);line-height:1.6}
.testi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.testi-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px}
.testi-stars{color:var(--gold);font-size:13px;margin-bottom:12px;letter-spacing:2px}
.testi-text{font-size:14px;color:#c9d0e0;line-height:1.75;margin-bottom:16px;font-style:italic}
.testi-author{display:flex;align-items:center;gap:10px}
.testi-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.testi-name{font-size:14px;font-weight:600}
.testi-role{font-size:12px;color:var(--muted)}
.faq-list{display:flex;flex-direction:column;gap:2px}
.faq-item{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:2px}
.faq-item.open{border-color:var(--gold-border)}
.faq-q{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;cursor:pointer;font-size:14px;font-weight:600;gap:12px}
.faq-q:hover{color:var(--gold)}
.faq-chevron{color:var(--muted);font-size:16px;flex-shrink:0;transition:transform .2s}
.faq-item.open .faq-chevron{transform:rotate(180deg);color:var(--gold)}
.faq-a{padding:14px 20px 18px;font-size:14px;color:var(--muted);line-height:1.75;border-top:1px solid var(--border)}
.nl-box{background:linear-gradient(135deg,var(--card) 0%,rgba(201,168,76,.06) 100%);border:1px solid var(--gold-border);border-radius:18px;padding:40px;text-align:center}
.nl-box h2{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:8px}
.nl-box p{color:var(--muted);font-size:14px;margin-bottom:24px}
.nl-form{display:flex;gap:10px;max-width:400px;margin:0 auto;flex-wrap:wrap;justify-content:center}
.nl-input{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border .2s}
.nl-input:focus{border-color:var(--gold)}
.nl-input::placeholder{color:var(--muted)}
.builder-grid{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start}
@media(max-width:820px){.builder-grid{grid-template-columns:1fr}}
.form-panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;display:flex;flex-direction:column;gap:10px}
.panel-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:2px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600}
.fi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .2s;width:100%;resize:none}
.fi:focus{border-color:var(--gold)}
.fi::placeholder{color:var(--faint)}
.gen-btn{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:#08090d;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px}
.gen-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.3)}
.gen-btn:disabled{opacity:.5;cursor:not-allowed}
.tpicker{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:14px}
.tcard{border-radius:9px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .18s}
.tcard:hover:not(.sel){border-color:rgba(201,168,76,.4);transform:translateY(-2px)}.tcard.sel{border-color:var(--gold)}
.tthumb{height:62px;position:relative;overflow:hidden;background:var(--surface)}
.tname{background:var(--surface);padding:5px;text-align:center;font-size:10px;font-weight:600;color:var(--muted)}
.tcard.sel .tname{color:var(--gold)}
.preview-box{display:flex;flex-direction:column;gap:12px}
.preview-frame{border-radius:12px;overflow:hidden;border:1px solid var(--border);box-shadow:0 24px 60px rgba(0,0,0,.6)}
.preview-frame iframe{width:100%;height:520px;border:none;display:block}
.ph-box{display:flex;align-items:center;justify-content:center;height:280px;background:var(--card);border-radius:12px;border:1px dashed var(--border);flex-direction:column;gap:12px;color:var(--muted);font-size:14px}
.dl-row{display:flex;gap:8px;flex-wrap:wrap}
.dl-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s}
.dl-btn:hover{border-color:var(--gold-border);color:var(--gold)}
.dl-main{background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:#08090d;border:none;font-weight:700}
.dl-main:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,168,76,.3);color:#08090d!important}
.ail{display:flex;gap:8px;align-items:center;color:var(--muted);font-size:13px;padding:16px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:bounce .8s infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.tips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.tip-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.tip-card:hover{border-color:rgba(201,168,76,.4);transform:translateY(-3px)}
.tip-icon{font-size:32px;margin-bottom:12px;display:block}
.tip-card h3{font-size:16px;font-weight:600;margin-bottom:6px}
.tip-card p{font-size:13px;color:var(--muted);line-height:1.55}
.tip-detail{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;animation:slideup .3s ease}
.tip-point{display:flex;gap:12px;padding:14px;background:var(--surface);border-radius:10px;border:1px solid var(--border);margin-bottom:10px}
.tip-num{min-width:28px;height:28px;border-radius:8px;background:var(--gold-dim);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.tip-point h4{font-size:14px;font-weight:600;margin-bottom:3px}
.tip-point p{font-size:13px;color:var(--muted);line-height:1.55}
.ai-loading{display:flex;gap:8px;align-items:center;color:var(--muted);font-size:13px;padding:20px 0}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;margin-bottom:20px;padding:0}
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}
.course-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .22s;cursor:pointer}
.course-card:hover{transform:translateY(-4px);border-color:rgba(201,168,76,.3);box-shadow:0 20px 50px rgba(0,0,0,.4)}
.course-banner{height:110px;display:flex;align-items:center;justify-content:center;font-size:46px}
.course-body{padding:18px}
.course-body h3{font-size:16px;font-weight:600;margin-bottom:6px}
.course-body p{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.55}
.course-meta{display:flex;align-items:center;justify-content:space-between}
.course-dur{font-size:12px;color:var(--muted)}
.ctag{font-size:11px;font-weight:700;letter-spacing:.8px;padding:3px 10px;border-radius:6px}
.ctag-f{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.ctag-p{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.ci-row{display:flex;gap:7px;align-items:center;margin-bottom:4px;font-size:12px;color:#9ca3af}
.ci-check{font-size:10px;color:var(--green)}
.lesson-layout{display:grid;grid-template-columns:240px 1fr;gap:18px;align-items:start}
@media(max-width:740px){.lesson-layout{grid-template-columns:1fr}}
.lsidebar{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;position:sticky;top:68px}
.lside-head{padding:12px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold);border-bottom:1px solid var(--border)}
.litem{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid rgba(30,37,53,.8);cursor:pointer;transition:all .15s}
.litem:last-child{border-bottom:none}
.litem:hover:not(.la){background:rgba(201,168,76,.04)}.la{background:var(--gold-dim)}
.lnum-b{width:24px;height:24px;border-radius:7px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0}
.la .lnum-b{background:rgba(201,168,76,.2);color:var(--gold)}
.ldone .lnum-b{background:rgba(34,197,94,.15);color:var(--green)}
.ltitle-b{font-size:12px;flex:1;line-height:1.4}
.ldur-b{font-size:11px;color:var(--muted);flex-shrink:0}
.lbox{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;animation:slideup .3s ease}
.lbox-head{padding:20px 24px;border-bottom:1px solid var(--border)}
.lbox-head h2{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin-bottom:4px}
.lbox-head p{color:var(--muted);font-size:12px}
.lbox-body{padding:22px;display:flex;flex-direction:column;gap:18px}
.vid-wrap{width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;background:#000}
.vid-wrap iframe{width:100%;height:100%;border:none}
.vid-label{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--muted)}
.intro-box{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15);border-radius:10px;padding:14px 16px}
.intro-box p{font-size:14px;color:#e8c97a;line-height:1.75;font-weight:500}
.prose p{font-size:14px;line-height:1.85;color:#d1d5db;margin-bottom:12px}
.prose p:last-child{margin-bottom:0}
.kps{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.kps h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold);margin-bottom:12px}
.kp{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}.kp:last-child{margin-bottom:0}
.kp-icon{font-size:18px;flex-shrink:0;line-height:1}
.kp h5{font-size:13px;font-weight:600;margin-bottom:3px}.kp p{font-size:12px;color:var(--muted);line-height:1.5}
.exercise-box{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:16px}
.exercise-box h4{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.exercise-box p{font-size:13px;color:#d1d5db;line-height:1.65}
.protip-box{background:rgba(34,197,94,.05);border-left:3px solid var(--green);padding:12px 16px;border-radius:0 10px 10px 0}
.protip-box strong{color:var(--green);font-size:11px;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px}
.protip-box p{font-size:13px;color:#d1d5db;line-height:1.6}
.prog-bar{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin:0 0 18px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-lt));border-radius:3px;transition:width .4s}
.lnav{display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-top:1px solid var(--border);gap:8px;flex-wrap:wrap}
.quiz-box{background:rgba(201,168,76,.04);border:1px solid var(--gold-border);border-radius:14px;padding:22px;animation:slideup .3s ease}
.quiz-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.quiz-hd h3{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--gold-lt)}
.quiz-prog-badge{font-size:12px;color:var(--muted);background:var(--border);padding:3px 10px;border-radius:100px}
.quiz-qnum{font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}

.qopt.qsel .opt-ltr{background:rgba(201,168,76,.2);color:var(--gold)}
.qopt.qcorr .opt-ltr{background:rgba(34,197,94,.2);color:var(--green)}
.qopt.qwrong .opt-ltr{background:rgba(239,68,68,.2);color:var(--red)}
.qopt.qshow .opt-ltr{background:rgba(34,197,94,.15);color:var(--green)}

.score-ring.fail{border-color:var(--red);background:rgba(239,68,68,.07)}

.c-border-out{position:absolute;inset:13px;border:2px solid #c9a84c;pointer-events:none}
.c-border-in{position:absolute;inset:19px;border:.5px solid rgba(201,168,76,.3);pointer-events:none}
.c-corner{position:absolute;font-size:20px;color:#c9a84c}

   lessons:[
     {id:1,title:'Overcoming Fear & Stage Fright',dur:'22 min',videoId:'8eRx5Wo3xIA',videoLabel:'Julian Treasure — "How to speak so people want to listen" (TED)',
      intro:'Fear of public speaking affects 75% of people — yet it is one of the most learnable skills in the world. You will understand why your body reacts the way it does and walk away with 5 proven techniques.',
      prose:['When you stand up to speak, your amygdala interprets the audience\'s gaze as a threat, triggering fight-or-flight. Cortisol and adrenaline flood your bloodstream causing racing heart, sweaty palms, and shaky hands. The key insight: your body is not failing you — it is giving you an enormous energy boost, the same chemistry elite athletes feel before competition.','Harvard researcher Alison Wood Brooks found that people who said "I am excited" before a speech performed significantly better than those who tried to calm down. The same physiological state — reframed as excitement — produces measurably better outcomes. You cannot think your way to calm. But you can redirect the energy.','Five techniques: (1) Box Breathing — 4 counts in, hold 4, out 4, hold 4 — lowers cortisol in 90 seconds. (2) Power Posing — 2 minutes of expansive posture raises confidence hormones. (3) Vivid Visualization — 10 minutes of imagining success activates identical neural pathways as actual rehearsal. (4) Audience Reframing — replace "They are judging me" with "They want me to succeed." (5) Progressive Exposure — record a 1-minute video opinion every day. Confidence is built through repetition.'],
      keyPoints:[{icon:'🧠',h:'Reframe anxiety as excitement',b:'Say "I am excited" instead of "I am nervous." Harvard research shows this reframe measurably improves speech performance.'},{icon:'💨',h:'Box breathing calms in 90 seconds',b:'4-count in, hold 4, out 4, hold 4. Physiologically activates your parasympathetic nervous system.'},{icon:'💪',h:'Power posing changes your chemistry',b:'2 minutes of open, expansive posture raises confidence hormones and lowers stress hormones.'},{icon:'🎯',h:'Preparation is the ultimate cure',b:'80% of speaking anxiety comes from insufficient preparation. Know your opening and closing cold.'}],
      exercise:'Record yourself speaking on any topic for exactly 3 minutes. Watch it back once with sound, once muted. Write one thing you did well and one to improve. Repeat weekly for 4 weeks.',
      proTip:'Elite speakers still feel nervous. The difference is they\'ve learned that butterflies mean they care. Channel the energy — don\'t try to erase it.',
      quiz:[{q:'What triggers your body\'s fight-or-flight when you stand up to speak?',opts:['The bright lights on stage','The amygdala interpreting the audience as a threat','Dehydration from nerves','Incorrect breathing'],ans:1,exp:'The amygdala triggers fight-or-flight when it perceives the audience\'s gaze as a threat — even though they mean no harm.'},{q:'What did Harvard\'s Alison Wood Brooks discover improves speech performance?',opts:['Saying "I am calm"','Saying "I am excited"','Deep meditation backstage','Avoiding eye contact initially'],ans:1,exp:'"I am excited" reframes physiological arousal from threat to opportunity, producing measurably better performance.'},{q:'What is Box Breathing?',opts:['Breathing into a paper bag','4 counts in, hold 4, out 4, hold 4','Just exhaling slowly for 30 seconds','Holding breath for as long as possible'],ans:1,exp:'Box Breathing — 4-4-4-4 — activates the parasympathetic nervous system and lowers cortisol within 90 seconds.'},{q:'What is the #1 cause of public speaking anxiety?',opts:['Poor posture on stage','Intimidating audiences','Under-preparation','Bad lighting'],ans:2,exp:'80% of speaking anxiety comes from under-preparation. Know your material thoroughly and your nerves will follow.'}]},
     {id:2,title:'Structuring Any Speech for Impact',dur:'25 min',videoId:'xnFF9F5_kAU',videoLabel:'Nancy Duarte — "The Secret Structure of Great Talks" (TED)',
      intro:'Great speakers master structure. When your speech is built on a solid framework, you always know where you are and where you are going — and that knowledge creates genuine confidence.',
      prose:['Your first 30 seconds determine whether your audience mentally checks in or checks out. Never open with "Good morning, my name is..." Five proven hooks: (1) The Question — "What if everything you believed about success was a lie?" (2) The Statistic — a powerful number that creates context. (3) The Mid-Scene Story — begin in the middle of a dramatic moment. (4) The Bold Claim — something surprising about your topic. (5) Strategic Silence — stand still and hold eye contact for 5 full seconds.','THE BODY: Make exactly 3 main points — the human brain organises information in triads. Within each point: one story (emotional connection), one fact (credibility), one example (clarity). THE CLOSE: Summarise in one sentence, give a specific call to action, end on an emotional high. Write your closing line before you write anything else — knowing your destination makes every creative decision easier.'],
      keyPoints:[{icon:'🎣',h:'Hook in the first 30 seconds',b:'Question, statistic, mid-scene story, bold claim, or strategic silence. Never introduce yourself first.'},{icon:'3️⃣',h:'Exactly 3 main points',b:'The brain loves triads. More than 3 and the audience cannot retain your message.'},{icon:'📖',h:'Story + Fact + Example per point',b:'Each point needs all three: story creates emotion, fact creates credibility, example creates clarity.'},{icon:'🎯',h:'Close with one clear action',b:'Tell your audience the single specific thing you want them to think or do next.'}],
      exercise:'Write a 3-minute speech about your career using today\'s structure. Use one opening hook. Make exactly 3 points. Close with what you want your listener to do differently.',
      proTip:'Write your closing line before you write anything else. Knowing your destination makes every other creative decision easier.',
      quiz:[{q:'How many main points should an effective speech have?',opts:['2','3','5','7'],ans:1,exp:'Three is the rule — it matches how the brain naturally organises and retains information. More than three and retention drops.'},{q:'Which of these is NOT one of the 5 proven opening hooks?',opts:['The Question','The Statistic','The Self-Introduction','The Bold Claim'],ans:2,exp:'Self-introduction is the weakest possible opening. The 5 hooks are: Question, Statistic, Mid-Scene Story, Bold Claim, Strategic Silence.'},{q:'Within each main point, what three elements create maximum impact?',opts:['Fact, statistic, and data','Story, fact, and example','Question, answer, and summary','Headline, body, and conclusion'],ans:1,exp:'Each point needs: a story (emotional connection), a fact (credibility), and an example (clarity). All three make ideas memorable and believable.'},{q:'What should you write first when preparing any speech?',opts:['The opening hook','The three main points','The closing line','The title'],ans:2,exp:'Write your closing line first. Knowing your destination makes every other creative decision easier — great speakers work backward.'}]},
     {id:3,title:'Vocal Power — Pitch, Pace & Pause',dur:'20 min',videoId:'eIho2S0ZahI',videoLabel:'Roger Love — "How to Use Your Voice" (TEDx)',
      intro:'Your voice carries 38% of your communication impact. HOW you say something is more influential than WHAT you say. Master the four vocal levers used by TED speakers and executives worldwide.',
      prose:['Four vocal levers: PITCH — vary height deliberately. Drop to your lowest comfortable pitch for most important statements — lower pitch is associated with authority. PACE — slow down 30% from conversational speed when speaking to groups. Most nervous speakers rush, which signals anxiety. VOLUME — unexpected quietness is more powerful than loudness. Dropping to near-whisper at a climactic moment makes every listener lean forward. RESONANCE — the warm, rich quality of voices like Morgan Freeman. Place your hand on your chest and hum — feel the vibration. That is chest resonance.','5-MINUTE WARM-UP before every speech: (1) Lip trills — 30 seconds. (2) Tongue twisters — "red leather, yellow leather" rapidly. (3) Sirens — slide from lowest to highest pitch 5 times. (4) Exaggerated yawning — opens the throat. (5) Humming — warms your vocal cords. These 5 exercises done consistently will transform your vocal performance in 30 days.'],
      keyPoints:[{icon:'🎵',h:'Variation is everything',b:'A monotone voice loses audiences within 4-5 minutes regardless of content. Range between high and low creates energy.'},{icon:'⏸️',h:'Silence after a key point IS the emphasis',b:'2-4 seconds of silence gives your most important sentence more weight than any adjective.'},{icon:'🔉',h:'Whispering creates more impact than shouting',b:'A sudden drop in volume at a climactic moment makes every listener physically lean in.'},{icon:'🎙️',h:'Warm up for 5 minutes every time',b:'Your vocal cords are muscles. Skipping warm-up leads to strain, cracks, and reduced range.'}],
      exercise:'Read a paragraph aloud at normal speed, then at 70% speed with deliberate 2-second pauses. Record both. Notice how dramatically pacing changes the perceived authority of identical words.',
      proTip:'Listen to a voice note of yourself and identify your three most frequent filler words. Awareness of your specific verbal tics is the first step to eliminating them.',
      quiz:[{q:'What percentage of your communication impact does voice carry?',opts:['7%','38%','55%','20%'],ans:1,exp:'Voice carries 38% of impact in emotionally significant communication — more than the words themselves.'},{q:'How much should you slow your pace when speaking to groups?',opts:['10%','50%','30%','70%'],ans:2,exp:'30% slower than conversational pace gives the audience time to absorb each idea without feeling slow or boring.'},{q:'What creates more emphasis than any adjective after a key point?',opts:['Repeating the point','Speaking louder','A deliberate 2-4 second pause','Using stronger verbs'],ans:2,exp:'A deliberate 2-4 second pause after your most important sentence gives it dramatic weight that no word can replicate.'},{q:'Where does vocal resonance come from?',opts:['Speaking from the throat','Speaking from the chest','Using a microphone','Increasing volume'],ans:1,exp:'Chest resonance is the warm, authoritative vibration felt when speaking from your chest — heard in voices like Morgan Freeman.'}]},
     {id:4,title:'Body Language That Commands Respect',dur:'23 min',videoId:'Ks-_Mh1QhMc',videoLabel:'Amy Cuddy — "Your Body Language Shapes Who You Are" (TED) · 60M+ views',
      intro:'55% of your communication is non-verbal. Before you speak a single word, your body has already shaped how your audience feels about you. Master the body language codes of confident communicators.',
      prose:['Dr. Albert Mehrabian\'s research: words carry 7% of meaning, voice 38%, body language 55%. When your words say one thing but your body says another, people believe your body every single time. POSTURE FOUNDATION: Feet hip-width apart, shoulders back and down, chin parallel to floor. This single adjustment makes you appear 40% more authoritative without any change in words. EYE CONTACT: 3-5 seconds with each person — genuine connection without staring. Move intentionally around the room. GESTURES: Open palms upward convey honesty — an ancient biological trust signal. The "steeple" (fingertips touching) signals deep expertise.','THE POWER POSE: Hold an expansive, open pose for 2 minutes before any high-stakes interaction. Amy Cuddy\'s research shows testosterone rises 20% and cortisol falls 25%. WHAT TO AVOID: Crossed arms (defensive), hands in pockets (hiding), touching your face while speaking (deception signal), swaying (nervous energy), nodding excessively (approval-seeking).'],
      keyPoints:[{icon:'🧍',h:'Posture is the foundation',b:'Feet hip-width, shoulders back, chin level. This single adjustment changes how people perceive your authority immediately.'},{icon:'👁️',h:'3-5 seconds of genuine eye contact',b:'Long enough to create real connection, short enough not to feel like staring. Move intentionally through the room.'},{icon:'🙌',h:'Open palms are a trust signal',b:'Hands visible with palms upward is an ancient biological trust signal the brain responds to powerfully.'},{icon:'💪',h:'2-minute power pose changes hormones',b:'Science shows this ritual measurably shifts testosterone up and cortisol down before high-stakes moments.'}],
      exercise:'For the next 7 days, set a daily reminder labelled "Posture Check." When it goes off: feet hip-width, shoulders back and down, chin level. Build it as an automatic habit.',
      proTip:'Before your next important meeting, hold a power pose for 2 minutes in a private space. Arms wide or hands on hips. You will walk in feeling and appearing genuinely different.',
      quiz:[{q:'What percentage of emotional communication is non-verbal?',opts:['7%','38%','55%','20%'],ans:2,exp:'Body language — posture, gestures, eye contact — carries 55% of emotional communication impact.'},{q:'How long should eye contact last with one person in a group speech?',opts:['10-15 seconds','3-5 seconds','30 seconds','1 second'],ans:1,exp:'3-5 seconds creates genuine connection without staring. After each thought, move your gaze to another person.'},{q:'How long should you hold a power pose before a high-stakes situation?',opts:['30 seconds','2 minutes','10 minutes','1 hour'],ans:1,exp:'Exactly 2 minutes of expansive posture measurably changes testosterone and cortisol — Amy Cuddy\'s research.'},{q:'Which gesture conveys honesty and openness?',opts:['Crossed arms','Hands in pockets','Open palms facing upward','Pointing a finger at the audience'],ans:2,exp:'Open palms is an ancient biological trust signal that the human brain still responds to powerfully.'}]}
   ]

   lessons:[
     {id:1,title:'The Pyramid Principle — Write Like McKinsey',dur:'22 min',videoId:'MtHgO6bVFTc',videoLabel:'The Pyramid Principle — Barbara Minto Framework explained',
      intro:'The Pyramid Principle is the communication framework used at McKinsey, Goldman Sachs, and Google. The single most powerful structure for any professional writing.',
      prose:['Lead with your conclusion, then support it. Most people build context, explain their analysis, and bury the conclusion at the end — forcing readers to read everything before knowing why they should care. Professional communication completely reverses this. THE PYRAMID: Level 1 — your conclusion at the top. Level 2 — three supporting reasons. Level 3 — evidence for each reason. In emails: first sentence = your conclusion or request. Paragraphs 2, 3, 4 = supporting reasons. Subject line = one-line conclusion, not a topic ("Proposing to delay Q3 launch by 2 weeks — seeking your sign-off").','THE SO WHAT TEST: After every sentence ask "So what?" If you cannot answer with something the reader cares about, cut that sentence. Most business writing fails this test in 40% of its sentences. SCQA: Situation → Complication → Question → Answer. This structure mirrors how the brain naturally processes information and works for any format — email, report, or presentation.'],
      keyPoints:[{icon:'🔺',h:'Lead with your conclusion always',b:'State what you want in the first sentence. Reasoning follows. This respects the reader\'s time and signals confident thinking.'},{icon:'3️⃣',h:'Three supporting reasons maximum',b:'More than three suggests you haven\'t prioritised clearly. Less is always more in professional writing.'},{icon:'❓',h:'Apply the "So What?" test ruthlessly',b:'After every sentence: "So what?" If the answer is nothing the reader cares about, delete it. No exceptions.'},{icon:'📧',h:'Subject line = conclusion not topic',b:'"Request: Approval for Q4 budget increase" beats "Budget Discussion" every single time.'}],
      exercise:'Take the last important email you sent. Rewrite it using the Pyramid Principle: main point first, then 3 supporting paragraphs. The rewrite will feel uncomfortably direct at first. That feeling is exactly right.',
      proTip:'Executives read only the first and last sentence of each paragraph. If those two sentences don\'t carry your full message, your email has already failed.',
      quiz:[{q:'In the Pyramid Principle, what always comes first?',opts:['Background context','Evidence and data','Your conclusion or recommendation','Your question'],ans:2,exp:'Always lead with the conclusion. Burying it at the end forces the reader to work through everything before knowing why they should care.'},{q:'What does the "So What?" test help you find?',opts:['The best opening line','Sentences the reader doesn\'t care about','Grammar errors','Your main argument'],ans:1,exp:'If you cannot answer "So what?" with something meaningful to the reader, that sentence should be deleted.'},{q:'How many supporting reasons should follow your conclusion?',opts:['1','2','3','5'],ans:2,exp:'Three — compelling enough to be convincing, few enough to be remembered by a busy reader.'},{q:'How should a professional email subject line be written?',opts:['As a vague topic','As a one-line conclusion or request','As a question','With your name and date'],ans:1,exp:'Subject lines should be mini-conclusions that make the email answerable before it\'s even opened.'}]},
     {id:2,title:'Active Listening — The Rarest Skill',dur:'20 min',videoId:'R1vskiVDwl4',videoLabel:'Celeste Headlee — "10 Ways to Have a Better Conversation" (TED) · 25M+ views',
      intro:'Most people listen to reply, not to understand. Active listening is the single most underrated skill in any workplace — and almost nobody actually has it.',
      prose:['Korn Ferry Institute: listening skills are the top quality separating the most effective leaders from average performers. Yet people who self-rated as excellent listeners were rated as poor listeners by those around them 94% of the time. RASA: Receive (full attention — phone away, body turned toward the speaker), Appreciate (small acknowledgments — "mmm," gentle nodding), Summarise ("So what I\'m hearing is..."), Ask (questions about what THEY said, not what you want to discuss).','LISTEN-FIRST: Before any important conversation: "My job for the first 5 minutes is to understand, not respond." This shifts everything. SILENCE IS PART OF LISTENING: Wait 3 seconds after someone stops speaking — silence surfaces the most important, unguarded information. EMPATHIC VALIDATION: Before offering your perspective, validate the emotion: "That sounds genuinely frustrating." Validation does not mean agreement — it unlocks the other person\'s openness to hearing you.'],
      keyPoints:[{icon:'📵',h:'Phone away — not just face-down',b:'The mere visible presence of a smartphone reduces conversation quality by 40% — even when neither person checks it.'},{icon:'3️⃣',h:'Wait 3 seconds after they stop speaking',b:'Silence surfaces the most important, unguarded information. Filling it immediately is a costly habit.'},{icon:'🔄',h:'Summarise before responding',b:'"So what I\'m hearing is..." proves you listened and prevents 80% of misunderstandings.'},{icon:'❤️',h:'Validate emotion before offering logic',b:'People need to feel heard before they can receive information. Emotional validation unlocks rational openness.'}],
      exercise:'In your next 3 conversations, ask at least 2 follow-up questions about something the other person said before sharing anything about yourself. Notice how differently people respond to you.',
      proTip:'The highest compliment you can pay someone is to remember what they told you last time and reference it specifically. This builds more professional goodwill than almost anything else.',
      quiz:[{q:'What does "R" in RASA stand for?',opts:['Reply promptly','Receive with full attention','Reflect on what you heard','React with empathy'],ans:1,exp:'RASA = Receive, Appreciate, Summarise, Ask. Receive means giving your full, undivided physical attention.'},{q:'How long should you wait after someone stops speaking?',opts:['1 second','3 seconds','10 seconds','30 seconds'],ans:1,exp:'3 seconds of deliberate silence consistently surfaces the most important, unguarded information.'},{q:'What reduces conversation quality by 40% even when not checked?',opts:['Speaking too quickly','A visible smartphone on the table','Background noise','Too much eye contact'],ans:1,exp:'The mere visible presence of a smartphone reduces conversation quality by 40% — put it completely away.'},{q:'What is empathic validation?',opts:['Agreeing with everything said','Giving immediate advice','Acknowledging the emotion before responding','Summarising facts and data'],ans:2,exp:'Empathic validation — "That sounds incredibly frustrating" — acknowledges the emotion, which unlocks openness to your perspective.'}]},
     {id:3,title:'Difficult Conversations — Say the Hard Thing Well',dur:'25 min',videoId:'S45eWMVnMpU',videoLabel:'Stone, Patton & Heen — "Difficult Conversations" (Harvard Law)',
      intro:'Every career breakthrough requires a difficult conversation. Most people avoid these moments — which is precisely why those who master them advance faster than everyone around them.',
      prose:['Harvard\'s Douglas Stone, Bruce Patton, and Sheila Heen found every difficult conversation contains three simultaneous conversations: "What happened?" (who did what, why), "Feelings" (both parties\' emotional experience), and "Identity" (what this means about who I am). Most people address only the first and wonder why the other two keep derailing things. SBI FRAMEWORK: Situation (describe factually: "In our Monday meeting..."), Behaviour (the specific observable action — not character: "when you cut across my presentation three times..."), Impact ("it made it very difficult for me to finish and I\'m concerned the client noticed"). No blame, no labels — observable facts and specific impact.','Use "I noticed" not "You always." Use "I felt" not "You made me feel." These shifts take you from accusation to observation. RECEIVING FEEDBACK: Resist the urge to immediately defend. Instead: ask for a specific example, acknowledge what is valid, take time before responding ("I want to think about this properly — can we revisit tomorrow?"). THE THIRD STORY: Enter conflict as a neutral observer: "We seem to see this differently — I\'d like to understand your perspective." This signals curiosity, not combat.'],
      keyPoints:[{icon:'🔍',h:'Observable behaviour only — no labels',b:'"You interrupted me three times" is observable. "You are disrespectful" is a label. Only one invites productive conversation.'},{icon:'🗣️',h:'"I" statements over "you" statements',b:'"I felt sidelined" invites empathy. "You sidelined me" invites defence. Same truth — completely different outcome.'},{icon:'⏸️',h:'Ask for time before responding to feedback',b:'"Let me think about this properly" is not weakness — it is the most professional response and produces better outcomes.'},{icon:'🌐',h:'Start from the Third Story',b:'Describe conflict as a neutral observer: "We see this differently — help me understand your perspective."'}],
      exercise:'Think of one difficult conversation you\'ve been avoiding. Write the SBI script: exact Situation, specific observable Behaviour, and Impact on you or the team. Writing it removes the emotional charge.',
      proTip:'The best preparation for a difficult conversation is practising small doses of direct, kind honesty every day. Each small honest moment builds the muscle for the big ones.',
      quiz:[{q:'How many simultaneous conversations does every difficult conversation contain?',opts:['One','Two','Three','Four'],ans:2,exp:'Harvard identifies three: "What happened?", "Feelings", and "Identity". Most people address only the first.'},{q:'In SBI, what does "B" stand for?',opts:['Background','Behaviour','Belief','Blame'],ans:1,exp:'Behaviour — the specific, observable action that occurred, not an interpretation or character label.'},{q:'Which language invites curiosity rather than defensiveness?',opts:['"You always do this"','"You never listen"','"I noticed something I\'d like to discuss"','"Everyone on the team agrees with me"'],ans:2,exp:'"I noticed" is a factual observation that invites open conversation. "You always/never" instantly triggers defensive shutdown.'},{q:'What is the "Third Story" technique?',opts:['Telling three sequential stories','Describing conflict from a neutral observer\'s perspective','Agreeing with everything','Involving a third-party mediator'],ans:1,exp:'The Third Story means describing the conflict as a neutral observer — outside both perspectives — signalling curiosity over combat.'}]},
     {id:4,title:'Meeting Communication — From Invisible to Indispensable',dur:'18 min',videoId:'wlZPRL1bphs',videoLabel:'Professional meeting facilitation & speaking up — Expert session',
      intro:'Most professionals speak in only 1 in 5 meetings they attend — and their careers reflect it. Meeting visibility is one of the highest-leverage career activities you have access to right now.',
      prose:['Harvard Business School: employees who speak up in meetings with relevant contributions are promoted faster, paid more, and rated as higher performers — regardless of their other work quality. THE FIRST 10 MINUTES RULE: Speak within the first 10 minutes of every meeting. It does not need to be groundbreaking — ask a clarifying question, build on someone\'s point: "I think what Priya raised is genuinely important — I had a similar concern when I reviewed the Q3 data." This removes the psychological barrier of speaking "for the first time" that silences people for entire meetings.','PREPARE 1 QUESTION + 1 CONTRIBUTION before every meeting. The Contribution Ladder — from lowest to highest impact: (1) Agreeing with others, (2) Asking clarifying questions, (3) Adding data to support someone\'s point, (4) Making a distinct new observation, (5) Proposing a specific recommendation. Aim for levels 4-5 at least once per meeting. FOLLOW UP IN WRITING within 30 minutes: "Quick recap of what we agreed: [1] [2] [3] — [Name] to do X by Friday." Almost nobody does this — which is exactly why it works so powerfully.'],
      keyPoints:[{icon:'⏱️',h:'Speak within the first 10 minutes',b:'Break your silence early in every meeting. Once you speak once, speaking again becomes effortless.'},{icon:'📋',h:'Prepare 1 question + 1 contribution',b:'5 minutes of preparation prevents the paralysis of "I had nothing worth saying." Make this a discipline.'},{icon:'🏆',h:'End with decisions + actions + owners',b:'A meeting without clearly stated next steps and named owners is just a conversation.'},{icon:'📝',h:'Send written recap within 30 minutes',b:'This single habit builds your reputation for reliability and leadership. Almost nobody does it — which is why it works.'}],
      exercise:'In your next meeting, commit to two contributions: one in the first 10 minutes and one distinct new point. Write both down before the meeting. Having them prepared removes the barrier to saying them.',
      proTip:'Consistent, relevant meeting contributions shape how decision-makers perceive your potential more than performance reviews, one-on-ones, or networking events combined.',
      quiz:[{q:'What fraction of meetings do most professionals speak up in?',opts:['All of them','1 in 2','1 in 3','1 in 5'],ans:3,exp:'Most professionals speak in only 1 in 5 meetings — making those who speak consistently immediately visible to decision-makers.'},{q:'When should you first speak up in any meeting?',opts:['Only when directly asked','Within the first 10 minutes','At the very end','Only when you have a perfect point'],ans:1,exp:'Speaking within the first 10 minutes removes the psychological barrier of the "first contribution" — making every subsequent one far easier.'},{q:'How quickly should you send a written recap after an important meeting?',opts:['Within 24 hours','By end of day','Within 30 minutes','Only when asked'],ans:2,exp:'Within 30 minutes — while the meeting is fresh. This transforms your professional reputation for reliability and creates a record of commitments.'},{q:'What is the highest level on the Contribution Ladder?',opts:['Agreeing with what others said','Asking clarifying questions','Adding data to support someone\'s point','Proposing a specific recommendation'],ans:3,exp:'Level 5 — proposing a specific recommendation — carries the most weight because it drives decisions and action, not just discussion.'}]}
   ]
